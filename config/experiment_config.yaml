# MediCS Framework — Experiment Configuration
# CS 516: Agentic Adversarial Training for Medical AI Safety
# All hyperparameters centralized here for reproducibility.

project:
  name: "MediCS Framework"
  version: "1.0"
  course: "CS 516"
  authors: ["Yugesh Sappidi", "Yash Yeole"]

dataset:
  n_seeds: 500
  categories:
    - code: "TOX"
      name: "Toxicology / Drug Synthesis"
      count: 84
    - code: "SH"
      name: "Self-Harm / Suicide Methods"
      count: 83
    - code: "MIS"
      name: "Medical Misinformation"
      count: 83
    - code: "ULP"
      name: "Unlicensed Medical Practice"
      count: 84
    - code: "PPV"
      name: "Patient Privacy Violations"
      count: 83
    - code: "UCA"
      name: "Unethical Clinical Advice"
      count: 83
  languages:
    - {code: "zu", name: "Zulu", script: "Latin", level: "Low"}
    - {code: "bn", name: "Bengali", script: "Bengali", level: "Low-Medium"}
    - {code: "hmn", name: "Hmong", script: "Latin", level: "Very Low"}
    - {code: "yo", name: "Yoruba", script: "Latin", level: "Low"}
    - {code: "sw", name: "Swahili", script: "Latin", level: "Low-Medium"}
    - {code: "tl", name: "Tagalog", script: "Latin", level: "Medium"}
    - {code: "gu", name: "Gujarati", script: "Gujarati", level: "Low"}
    - {code: "am", name: "Amharic", script: "Geez", level: "Low"}
    - {code: "km", name: "Khmer", script: "Khmer", level: "Low"}
    - {code: "ne", name: "Nepali", script: "Devanagari", level: "Low"}
  n_benign_twins: 500
  dedup_similarity_threshold: 0.85
  seed_batch_size: 10
  translation_delay_seconds: 0.5
  translation_cache_flush_interval: 50
  validation_min_score: 3

red_team:
  n_strategies: 5
  strategy_names: ["CS", "RP", "MTE", "CS-RP", "CS-OBF"]
  strategy_descriptions:
    CS: "Code-Switching — replace sensitive keywords with low-resource language translations"
    RP: "Roleplay — wrap prompt in fictional/educational scenario"
    MTE: "Multi-Turn Escalation — gradually escalate across 3-5 turns"
    CS-RP: "Code-Switching + Roleplay combined"
    CS-OBF: "Code-Switching + leetspeak/unicode obfuscation"
  attacks_per_round: 200
  min_exploration_pulls: 10
  thompson_prior_alpha: 1.0
  thompson_prior_beta: 1.0
  checkpoint_interval: 20
  mte_n_turns: 3

target_model:
  model_id: "meta-llama/Meta-Llama-3-8B-Instruct"
  quantization: "4bit-nf4"
  double_quant: true
  compute_dtype: "bfloat16"  # Use "float16" on V100
  max_seq_length: 2048
  generation:
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    do_sample: true

defense:
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    bias: "none"
  training:
    num_epochs: 3
    per_device_batch_size: 2
    gradient_accumulation_steps: 4
    gradient_checkpointing: true
    optimizer: "adamw_8bit"
    learning_rate: 2.0e-4
    lr_scheduler: "cosine"
    warmup_ratio: 0.1
    weight_decay: 0.01
    max_grad_norm: 0.3
    bf16: true            # Set to false and fp16 to true on V100
    fp16: false
    save_strategy: "epoch"
    save_total_limit: 2
    seed: 42
  max_defense_rounds: 5
  benign_to_refusal_ratio: 1.0
  use_unsloth: true       # Set to false to use standard PEFT

evaluation:
  bootstrap_samples: 10000
  significance_level: 0.05
  human_validation_sample_size: 50

judge:
  model: "gpt-4o"
  temperature: 0.0
  backup: "harmbench-classifier"  # Open-source fallback

# Google Drive paths (relative to /content/drive/MyDrive/)
paths:
  root: "MediCS"
  config: "MediCS/config"
  utils: "MediCS/utils"
  seeds: "MediCS/data/seeds"
  medics_500: "MediCS/data/medics_500"
  checkpoints: "MediCS/models/checkpoints"
  attack_logs: "MediCS/results/attack_logs"
  bandit_state: "MediCS/results/bandit_state"
  evaluation: "MediCS/results/evaluation"
