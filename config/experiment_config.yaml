# MediCS Framework — Experiment Configuration
# CS 516: Agentic Adversarial Training for Medical AI Safety
# All hyperparameters centralized here for reproducibility.

project:
  name: "MediCS Framework"
  version: "2.1.0"
  course: "CS 516"
  authors: ["Yugesh Sappidi", "Yash Yeole"]

dataset:
  n_seeds: 500
  categories:
    - code: "TOX"
      name: "Toxicology / Drug Synthesis"
      count: 84
    - code: "SH"
      name: "Self-Harm / Suicide Methods"
      count: 83
    - code: "MIS"
      name: "Medical Misinformation"
      count: 83
    - code: "ULP"
      name: "Unlicensed Medical Practice"
      count: 84
    - code: "PPV"
      name: "Patient Privacy Violations"
      count: 83
    - code: "UCA"
      name: "Unethical Clinical Advice"
      count: 83
  languages:
    - {code: "hi", name: "Hindi", script: "Devanagari", family: "Indo-European"}
    - {code: "bn", name: "Bengali", script: "Bengali", family: "Indo-European"}
    - {code: "sw", name: "Swahili", script: "Latin", family: "Niger-Congo"}
    - {code: "yo", name: "Yoruba", script: "Latin", family: "Niger-Congo"}
    - {code: "tl", name: "Tagalog", script: "Latin", family: "Austronesian"}
    - {code: "gu", name: "Gujarati", script: "Gujarati", family: "Indo-European"}
  n_benign_twins: 500
  dedup_similarity_threshold: 0.85
  semantic_threshold: 0.75
  translation_cache_flush_interval: 50
  keyword_extraction:
    max_workers: 10
    checkpoint_interval: 50
    request_timeout: 30
  code_switching:
    max_workers: 10
  back_translation:
    max_workers: 30
    google_attempts: 2
    mymemory_attempts: 1

data_dir: "data"

red_team:
  n_strategies: 5
  strategy_names: ["CS", "RP", "MTE", "CS-RP", "CS-OBF"]
  strategy_descriptions:
    CS: "Code-Switching — replace sensitive keywords with low-resource language translations"
    RP: "Roleplay — wrap prompt in fictional/educational scenario"
    MTE: "Multi-Turn Escalation — gradually escalate across 3-5 turns"
    CS-RP: "Code-Switching + Roleplay combined"
    CS-OBF: "Code-Switching + leetspeak/unicode obfuscation"
  attacks_per_round: 200
  min_exploration_pulls: 10
  thompson_prior_alpha: 1.0
  thompson_prior_beta: 1.0
  checkpoint_interval: 20
  mte_n_turns: 5
  curriculum:
    1: ["CS", "RP", "MTE", "CS-RP", "CS-OBF"]
    2: ["CS", "RP", "MTE", "CS-RP", "CS-OBF"]
    3: ["CS", "RP", "MTE", "CS-RP", "CS-OBF"]

categories:
  - "TOX"
  - "SH"
  - "MIS"
  - "ULP"
  - "PPV"
  - "UCA"

target_model:
  model_id: "meta-llama/Meta-Llama-3-8B-Instruct"
  quantization: "4bit-nf4"
  double_quant: true
  compute_dtype: "bfloat16"
  generation:
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    do_sample: true

defense:
  sft:
    lora:
      r: 16
      alpha: 32
      dropout: 0.05
      target_modules:
        - "q_proj"
        - "k_proj"
        - "v_proj"
        - "o_proj"
        - "gate_proj"
        - "up_proj"
        - "down_proj"
      bias: "none"
    training:
      num_epochs: 3
      per_device_batch_size: 2
      gradient_accumulation_steps: 8
      gradient_checkpointing: true
      learning_rate: 2.0e-4
      lr_scheduler: "cosine"
      warmup_ratio: 0.1
      weight_decay: 0.01
      fp16: true
      logging_steps: 10
      eval_strategy: "epoch"
      save_strategy: "epoch"
      save_total_limit: 2
      load_best_model_at_end: true
      max_seq_length: 1024
      seed: 42
  dpo:
    lora:
      r: 8
      alpha: 16
      dropout: 0.05
      target_modules:
        - "q_proj"
        - "k_proj"
        - "v_proj"
        - "o_proj"
    training:
      num_epochs: 1
      per_device_batch_size: 1
      gradient_accumulation_steps: 16
      learning_rate: 5.0e-5
      beta: 0.1
      loss_type: "sigmoid"
      fp16: true
      logging_steps: 10
      eval_strategy: "epoch"
      save_strategy: "epoch"
      max_length: 1024
      max_prompt_length: 512
      gradient_checkpointing: true
      seed: 42
  benign_to_refusal_ratio: 1.0

evaluation:
  bootstrap_samples: 10000
  significance_level: 0.05
  seeds: [42, 123, 456]

transfer:
  model_id: "mistralai/Mistral-7B-Instruct-v0.3"

judge:
  model: "gpt-5-chat"
  temperature: 0.0
  max_error_rate: 0.25

analysis:
  tokenization:
    max_seeds: 0  # 0 = analyze all seeds
    output_dir: "results/analysis"
  detection:
    perplexity_thresholds: [10, 20, 50, 100, 200, 500, 1000]
    output_dir: "results/analysis"
  timing:
    output_path: "results/timing_report.json"
  figures_total: 10

paths:
  root: "MediCS"
  analysis: "results/analysis"
  config: "config"
  seeds: "data/seeds"
  medics_500: "data/medics_500"
  splits: "data/splits"
  defense_data: "data/defense"
  checkpoints_sft: "checkpoints/sft"
  checkpoints_dpo: "checkpoints/dpo"
  attack_results: "results/attacks"
  eval_results: "results/eval"
  transfer_results: "results/transfer"
  figures: "figures"
